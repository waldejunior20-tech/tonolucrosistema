<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <style>
      .font-tono { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 800; font-size: 52px; letter-spacing: -1.5px; }
      .font-lucro { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400; font-size: 52px; letter-spacing: -1.5px; }
    </style>
  </defs>

  <!-- VERSÃO FUNDO ESCURO (TL) -->
  <g id="dark-version">
    <rect x="0" y="0" width="500" height="500" fill="#06142E"/>
    <g transform="translate(150, 130)">
      <rect x="0" y="0" width="130" height="35" fill="#FFFFFF"/>
      <rect x="65" y="35" width="45" height="115" fill="#FFFFFF"/>
      <rect x="125" y="60" width="45" height="90" fill="#FFFFFF"/>
      <rect x="125" y="115" width="90" height="35" fill="#FFFFFF"/>
      <rect x="125" y="25" width="45" height="35" fill="#0091FF"/>
      <path d="M 125,25 L 185,-35 L 150,-35 L 150,-55 L 205,-55 L 205,0 L 185,0 L 185,-20 L 145,25 Z" fill="#0091FF"/>
    </g>
    <g transform="translate(135, 395)">
      <text x="0" y="0" class="font-tono" fill="#FFFFFF">tôno</text>
      <text x="115" y="0" class="font-lucro" fill="#0091FF">lucro</text>
    </g>
  </g>

  <!-- VERSÃO FUNDO BRANCO (TL) -->
  <g id="light-version" transform="translate(500, 0)">
    <rect x="0" y="0" width="500" height="500" fill="#FFFFFF"/>
    <g transform="translate(150, 130)">
      <rect x="0" y="0" width="130" height="35" fill="#06142E"/>
      <rect x="65" y="35" width="45" height="115" fill="#06142E"/>
      <rect x="125" y="60" width="45" height="90" fill="#06142E"/>
      <rect x="125" y="115" width="90" height="35" fill="#06142E"/>
      <rect x="125" y="25" width="45" height="35" fill="#0091FF"/>
      <path d="M 125,25 L 185,-35 L 150,-35 L 150,-55 L 205,-55 L 205,0 L 185,0 L 185,-20 L 145,25 Z" fill="#0091FF"/>
    </g>
    <g transform="translate(135, 395)">
      <text x="0" y="0" class="font-tono" fill="#06142E">tôno</text>
      <text x="115" y="0" class="font-lucro" fill="#0091FF">lucro</text>
    </g>
  </g>
</svg>
