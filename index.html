<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>TôNoLucro — Gestão e Precificação para Pizzarias</title>
    <meta
      name="description"
      content="Sistema completo de gestão, fichas técnicas, proporções inteligentes e precificação para pizzarias e food service."

    <meta name="author" content="TôNoLucro" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://tonolucrosistema.lovable.app/" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="background-color" content="#F8FAFC" />
    <meta name="application-name" content="TôNoLucro" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TôNoLucro" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TôNoLucro" />
    <meta property="og:title" content="TôNoLucro — Gestão para Pizzarias" />
    <meta
      property="og:description"
      content="Fichas técnicas, proporções inteligentes e precificação para pizzarias."
    />
    <meta property="og:url" content="https://tonolucrosistema.lovable.app/" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image" content="https://tonolucrosistema.lovable.app/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TôNoLucro" />
    <meta
      name="twitter:description"
      content="Sistema de gestão e precificação para food service"
    />
    <meta name="twitter:image" content="https://tonolucrosistema.lovable.app/icon-512.png" />

    <!-- Structured data: Organization + SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "TôNoLucro",
            "url": "https://tonolucrosistema.lovable.app/",
            "logo": "https://tonolucrosistema.lovable.app/icon-512.png"
          },
          {
            "@type": "SoftwareApplication",
            "name": "TôNoLucro",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web, iOS, Android",
            "description": "Sistema de gestão, fichas técnicas, proporções inteligentes e precificação para pizzarias e food service.",
            "inLanguage": "pt-BR",
            "url": "https://tonolucrosistema.lovable.app/",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "BRL" }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
